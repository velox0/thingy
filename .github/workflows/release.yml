name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc make libncurses-dev libcurl4-openssl-dev
      - name: Build
        run: make
      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          pkgdir="release/thingy-${VERSION}-linux-amd64"
          mkdir -p "$pkgdir"
          install -m 755 build/bin/thingy "$pkgdir/thingy"
          echo "thingy ${VERSION}" > "$pkgdir/VERSION"
          cd release && tar -czf "thingy-${VERSION}-linux-amd64.tar.gz" "thingy-${VERSION}-linux-amd64"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: thingy-linux-amd64
          path: release/*.tar.gz

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc make libncurses-dev libcurl4-openssl-dev
      - name: Build
        run: make
      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          pkgdir="release/thingy-${VERSION}-linux-arm64"
          mkdir -p "$pkgdir"
          install -m 755 build/bin/thingy "$pkgdir/thingy"
          echo "thingy ${VERSION}" > "$pkgdir/VERSION"
          cd release && tar -czf "thingy-${VERSION}-linux-arm64.tar.gz" "thingy-${VERSION}-linux-arm64"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: thingy-linux-arm64
          path: release/*.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: brew install ncurses curl
      - name: Build
        run: make
      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          pkgdir="release/thingy-${VERSION}-macos-arm64"
          mkdir -p "$pkgdir"
          install -m 755 build/bin/thingy "$pkgdir/thingy"
          echo "thingy ${VERSION}" > "$pkgdir/VERSION"
          cd release && tar -czf "thingy-${VERSION}-macos-arm64.tar.gz" "thingy-${VERSION}-macos-arm64"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: thingy-macos-arm64
          path: release/*.tar.gz

  release:
    needs: [build-linux-amd64, build-linux-arm64, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.tar.gz
