name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux-amd64:
    runs-on: ubuntu-latest
    container: alpine:latest
    steps:
      - name: Install dependencies
        run: apk add --no-cache gcc make musl-dev ncurses-dev curl-dev
      - uses: actions/checkout@v4
      - name: Build
        run: make
      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          pkgdir="release/thingy-${VERSION}-linux-amd64"
          mkdir -p "$pkgdir"
          install -m 755 build/bin/thingy "$pkgdir/thingy"
          echo "thingy ${VERSION}" > "$pkgdir/VERSION"
          cd release && tar -czf "thingy-${VERSION}-linux-amd64.tar.gz" "thingy-${VERSION}-linux-amd64"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: thingy-linux-amd64
          path: release/*.tar.gz

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq gcc make libncurses-dev libcurl4-openssl-dev
      - uses: actions/checkout@v4
      - name: Build
        run: make
      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          pkgdir="release/thingy-${VERSION}-linux-arm64"
          mkdir -p "$pkgdir"
          install -m 755 build/bin/thingy "$pkgdir/thingy"
          echo "thingy ${VERSION}" > "$pkgdir/VERSION"
          cd release && tar -czf "thingy-${VERSION}-linux-arm64.tar.gz" "thingy-${VERSION}-linux-arm64"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: thingy-linux-arm64
          path: release/*.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: brew install ncurses curl
      - name: Build
        run: make
      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          pkgdir="release/thingy-${VERSION}-macos-arm64"
          mkdir -p "$pkgdir"
          install -m 755 build/bin/thingy "$pkgdir/thingy"
          echo "thingy ${VERSION}" > "$pkgdir/VERSION"
          cd release && tar -czf "thingy-${VERSION}-macos-arm64.tar.gz" "thingy-${VERSION}-macos-arm64"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: thingy-macos-arm64
          path: release/*.tar.gz

  release:
    needs: [build-linux-amd64, build-linux-arm64, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.tar.gz

  update-brew:
    needs: [release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Update homebrew formula
        env:
          DEPLOY_KEY: ${{ secrets.BREW_DEPLOY_KEY }}
          HOMEBREW_REPO: ${{ vars.HOMEBREW_REPO }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARBALL_URL="https://github.com/${{ github.repository }}/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"
          SHA256=$(curl -sL "$TARBALL_URL" | sha256sum | awk '{print $1}')

          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          git config --global core.sshCommand "ssh -i ~/.ssh/deploy_key"

          git clone "git@github.com:${HOMEBREW_REPO}.git" /tmp/brew
          cd /tmp/brew

          cat > Formula/thingy.rb <<EOF
          class Thingy < Formula
            desc "Sakura-themed TUI editor with code execution"
            homepage "https://thingy.velox0.com/"
            url "${TARBALL_URL}"
            sha256 "${SHA256}"
            license "Unlicense"

            depends_on "ncurses"
            depends_on "curl"

            def install
              system "make", "VERSION=#{version}"
              bin.install "build/bin/thingy"
            end

            test do
              system "#{bin}/thingy", "--help"
            end
          end
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/thingy.rb
          git diff --cached --quiet || (git commit -m "Brew formula update for ${GITHUB_REF_NAME}" && git push)
